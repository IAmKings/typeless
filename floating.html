<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Floating Window</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: transparent;
        -webkit-app-region: drag;
        user-select: none;
      }

      .floating-container {
        background: rgba(30, 30, 30, 0.85);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border-radius: 16px;
        padding: 16px;
        min-width: 280px;
        max-width: 360px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      /* Header row */
      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
      }

      .title {
        font-size: 12px;
        color: rgba(255, 255, 255, 0.6);
        font-weight: 500;
      }

      .close-btn {
        -webkit-app-region: no-drag;
        width: 20px;
        height: 20px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.1);
        border: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.2s;
        color: rgba(255, 255, 255, 0.8);
        font-size: 14px;
        line-height: 1;
      }

      .close-btn:hover {
        background: rgba(255, 59, 48, 0.8);
      }

      /* Status row */
      .status-row {
        display: flex;
        gap: 12px;
        margin-bottom: 12px;
      }

      .status-item {
        flex: 1;
        background: rgba(255, 255, 255, 0.05);
        border-radius: 10px;
        padding: 10px;
        text-align: center;
      }

      .status-label {
        font-size: 10px;
        color: rgba(255, 255, 255, 0.5);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 4px;
      }

      .status-value {
        font-size: 13px;
        font-weight: 600;
        color: #fff;
      }

      .status-value.recording {
        color: #ff3b30;
      }

      .status-value.connected {
        color: #34c759;
      }

      .status-value.connecting {
        color: #ff9500;
      }

      .status-value.disconnected {
        color: #8e8e93;
      }

      .status-value.error {
        color: #ff3b30;
      }

      .status-value.idle {
        color: #8e8e93;
      }

      /* Audio waveform */
      .waveform-container {
        background: rgba(0, 0, 0, 0.3);
        border-radius: 8px;
        padding: 8px;
        margin-bottom: 12px;
      }

      .waveform-canvas {
        width: 100%;
        height: 40px;
        display: block;
      }

      /* Transcript display area */
      .transcript-container {
        min-height: 24px;
        margin-bottom: 12px;
        font-size: 13px;
        color: rgba(255, 255, 255, 0.9);
        line-height: 1.4;
        word-break: break-word;
      }

      .transcript-text {
        display: inline;
      }

      .transcript-cursor {
        display: inline;
        animation: blink 1s step-end infinite;
      }

      @keyframes blink {
        50% { opacity: 0; }
      }

      /* Action hint */
      .action-hint {
        text-align: center;
        font-size: 11px;
        color: rgba(255, 255, 255, 0.4);
      }

      /* Click to cancel (shown when recording) */
      .cancel-hint {
        display: none;
        text-align: center;
        font-size: 12px;
        color: rgba(255, 255, 255, 0.6);
        padding: 8px;
        background: rgba(255, 59, 48, 0.2);
        border-radius: 8px;
        cursor: pointer;
        -webkit-app-region: no-drag;
        transition: background 0.2s;
      }

      .cancel-hint:hover {
        background: rgba(255, 59, 48, 0.4);
      }

      .cancel-hint.visible {
        display: block;
      }
    </style>
  </head>
  <body>
    <div class="floating-container">
      <div class="header">
        <span class="title">Voice Input</span>
        <button class="close-btn" id="closeBtn">×</button>
      </div>

      <div class="status-row">
        <div class="status-item">
          <div class="status-label">Mic</div>
          <div class="status-value idle" id="micStatus">Idle</div>
        </div>
        <div class="status-item">
          <div class="status-label">ASR</div>
          <div class="status-value disconnected" id="asrStatus">Offline</div>
        </div>
      </div>

      <div class="waveform-container">
        <canvas class="waveform-canvas" id="waveformCanvas"></canvas>
      </div>

      <div class="transcript-container">
        <span class="transcript-text" id="transcriptText"></span><span class="transcript-cursor" id="transcriptCursor">|</span>
      </div>

      <div class="cancel-hint" id="cancelHint">Click to Cancel</div>
      <div class="action-hint" id="actionHint">Press hotkey to start</div>
    </div>

    <script type="module" src="/src/renderer/floating.ts"></script>
  </body>
</html>
