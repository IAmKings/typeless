name: CI

on:
  push:
    branches-ignore:
      - 'v*'  # Ignore version tags, they trigger release workflow
  pull_request:
  workflow_dispatch:

env:
  ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: npx tsc --noEmit

---

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/

jobs:
  build:
    strategy:
      matrix:
        include:
          - platform: macos-latest
            arch: x64
          - platform: macos-latest
            arch: arm64

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm make
        env:
          ARCH: ${{ matrix.arch }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            out/make/zip/darwin/${{ matrix.arch }}/*
          if-no-files-found: error
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
