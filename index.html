<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Voice Input Test</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        padding: 20px;
        max-width: 600px;
        margin: 0 auto;
      }
      h1 { color: #333; }
      .section { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 8px; }
      .section h2 { margin-top: 0; color: #666; font-size: 16px; }
      button {
        padding: 10px 20px;
        margin: 5px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 14px;
        transition: background 0.2s;
      }
      button.primary { background: #007AFF; color: white; }
      button.primary:hover { background: #0056b3; }
      button.danger { background: #FF3B30; color: white; }
      button.danger:hover { background: #d32f2f; }
      button.success { background: #34C759; color: white; }
      button:disabled { opacity: 0.5; cursor: not-allowed; }
      #log {
        background: #1e1e1e;
        color: #d4d4d4;
        padding: 15px;
        border-radius: 6px;
        font-family: 'SF Mono', Monaco, monospace;
        font-size: 12px;
        max-height: 300px;
        overflow-y: auto;
        white-space: pre-wrap;
      }
      .log-info { color: #4fc3f7; }
      .log-success { color: #66bb6a; }
      .log-error { color: #ef5350; }
      .log-warn { color: #ffa726; }
      #devices { margin: 10px 0; }
      #devices select {
        width: 100%;
        padding: 8px;
        border-radius: 4px;
        border: 1px solid #ddd;
      }
      #level-bar {
        height: 20px;
        background: #e0e0e0;
        border-radius: 10px;
        overflow: hidden;
        margin-top: 10px;
      }
      #level-fill {
        height: 100%;
        background: linear-gradient(90deg, #4caf50, #ffeb3b, #f44336);
        width: 0%;
        transition: width 0.05s;
      }
      /* Status indicator */
      .status-indicator {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 16px;
        border-radius: 20px;
        font-size: 14px;
        font-weight: 500;
      }
      .status-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
      }
      .status-configured .status-dot { background: #34C759; }
      .status-configured { background: #e8f5e9; color: #2e7d32; }
      .status-not-configured .status-dot { background: #ff9800; }
      .status-not-configured { background: #fff3e0; color: #e65100; }
      .status-connecting .status-dot { background: #2196f3; animation: pulse 1s infinite; }
      .status-connecting { background: #e3f2fd; color: #1565c0; }
      .status-connected .status-dot { background: #34C759; }
      .status-connected { background: #e8f5e9; color: #2e7d32; }
      .status-disconnected .status-dot { background: #9e9e9e; }
      .status-disconnected { background: #f5f5f5; color: #616161; }
      .status-error .status-dot { background: #f44336; }
      .status-error { background: #ffebee; color: #c62828; }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
      }
    </style>
  </head>
  <body>
    <h1>🎤 Voice Input Test</h1>

    <div class="section">
      <h2>🔗 ASR API Status</h2>
      <div style="display: flex; align-items: center; gap: 16px; margin-bottom: 15px;">
        <div id="asrStatus" class="status-indicator status-not-configured">
          <span class="status-dot"></span>
          <span class="status-text">Not Configured</span>
        </div>
        <button id="btnCheckConfig" class="primary">Check Config</button>
        <button id="btnConnect" class="success" disabled>Connect</button>
        <button id="btnDisconnect" class="danger" disabled>Disconnect</button>
      </div>
      <div id="asrInfo" style="font-size: 12px; color: #666; margin-top: 10px;">
        Configure .env file with VOLCENGINE_APP_ID, VOLCENGINE_ACCESS_TOKEN, VOLCENGINE_RESOURCE_ID
      </div>
    </div>

    <div class="section">
      <h2>📋 Devices</h2>
      <button id="btnGetDevices" class="primary">Get Devices</button>
      <div id="devices">
        <select id="deviceSelect" style="display:none">
          <option value="">Select a microphone...</option>
        </select>
      </div>
    </div>

    <div class="section">
      <h2>🔴 Recording</h2>
      <button id="btnStart" class="primary" disabled>Start Recording</button>
      <button id="btnStop" class="danger" disabled>Stop Recording</button>
      <div id="level-bar"><div id="level-fill"></div></div>
    </div>

    <div class="section">
      <h2>📝 Log</h2>
      <div id="log"></div>
    </div>

    <script type="module" src="/src/renderer.ts"></script>
    <script>
      const logEl = document.getElementById('log');
      const deviceSelect = document.getElementById('deviceSelect');
      const levelFill = document.getElementById('level-fill');
      const btnGetDevices = document.getElementById('btnGetDevices');
      const btnStart = document.getElementById('btnStart');
      const btnStop = document.getElementById('btnStop');
      const asrStatus = document.getElementById('asrStatus');
      const asrInfo = document.getElementById('asrInfo');
      const btnCheckConfig = document.getElementById('btnCheckConfig');
      const btnConnect = document.getElementById('btnConnect');
      const btnDisconnect = document.getElementById('btnDisconnect');

      function log(message, type = 'info') {
        const prefix = {
          info: 'ℹ️',
          success: '✅',
          error: '❌',
          warn: '⚠️'
        }[type];
        const line = document.createElement('div');
        line.className = `log-${type}`;
        line.textContent = `${prefix} ${new Date().toLocaleTimeString()} ${message}`;
        logEl.appendChild(line);
        logEl.scrollTop = logEl.scrollHeight;
      }

      function setASRStatus(status, text) {
        asrStatus.className = `status-indicator status-${status}`;
        asrStatus.querySelector('.status-text').textContent = text;
      }

      function updateButtons(configured, connected) {
        btnCheckConfig.disabled = false;
        btnConnect.disabled = !configured || connected;
        btnDisconnect.disabled = !connected;
        btnStart.disabled = !connected;
      }

      // Update level bar
      window.updateLevel = (level) => {
        levelFill.style.width = `${level}%`;
      };

      // Check ASR config
      btnCheckConfig.addEventListener('click', async () => {
        log('Checking ASR configuration...');
        setASRStatus('connecting', 'Checking...');
        try {
          const result = await window.api.asr.getConfig();
          if (result.configured) {
            log('ASR configuration found', 'success');
            setASRStatus('configured', 'Configured');
            asrInfo.textContent = `AppId: ${result.config.appKey.slice(0, 8)}...`;
            updateButtons(true, false);
          } else {
            log('ASR configuration not found. Check .env file.', 'warn');
            setASRStatus('not-configured', 'Not Configured');
            asrInfo.textContent = 'Configure .env file with VOLCENGINE_APP_ID, VOLCENGINE_ACCESS_TOKEN, VOLCENGINE_RESOURCE_ID';
            updateButtons(false, false);
          }
        } catch (err) {
          log(`Error: ${err.message}`, 'error');
          setASRStatus('error', 'Error');
          updateButtons(false, false);
        }
      });

      // Connect to ASR
      btnConnect.addEventListener('click', async () => {
        log('Connecting to ASR server...');
        setASRStatus('connecting', 'Connecting...');
        try {
          const config = await window.api.asr.getConfig();
          if (!config.configured) {
            log('ASR not configured', 'error');
            setASRStatus('not-configured', 'Not Configured');
            return;
          }
          await window.api.asr.connect(config.config);
          log('Connection initiated', 'success');
        } catch (err) {
          log(`Connect error: ${err.message}`, 'error');
          setASRStatus('error', 'Error');
        }
      });

      // Disconnect from ASR
      btnDisconnect.addEventListener('click', async () => {
        log('Disconnecting from ASR server...');
        try {
          await window.api.asr.disconnect();
          log('Disconnected', 'success');
          setASRStatus('disconnected', 'Disconnected');
          updateButtons(true, false);
        } catch (err) {
          log(`Disconnect error: ${err.message}`, 'error');
        }
      });

      // Get devices
      btnGetDevices.addEventListener('click', async () => {
        log('Getting audio devices...');
        try {
          const devices = await window.api.audio.getDevices();
          log(`Found ${devices.length} device(s)`, 'success');
          deviceSelect.innerHTML = '<option value="">Select a microphone...</option>';
          devices.forEach((d, i) => {
            const opt = document.createElement('option');
            opt.value = d.deviceId;
            opt.textContent = `${d.label}${d.isDefault ? ' (Default)' : ''}`;
            deviceSelect.appendChild(opt);
          });
          deviceSelect.style.display = 'block';
        } catch (err) {
          log(`Error: ${err.message}`, 'error');
        }
      });

      // Start recording
      btnStart.addEventListener('click', async () => {
        const deviceId = deviceSelect.value || undefined;
        log(`Starting recording${deviceId ? ` with device: ${deviceId}` : ' (default)'}...`);
        try {
          const result = await window.api.audio.startRecording(deviceId ? { deviceId } : {});
          if (result.success) {
            log('Recording started!', 'success');
            btnStart.disabled = true;
            btnStop.disabled = false;
            btnGetDevices.disabled = true;
          } else {
            log(`Failed: ${result.error}`, 'error');
          }
        } catch (err) {
          log(`Error: ${err.message}`, 'error');
        }
      });

      // Stop recording
      btnStop.addEventListener('click', async () => {
        log('Stopping recording...');
        try {
          await window.api.audio.stopRecording();
          log('Recording stopped', 'success');
          btnStart.disabled = false;
          btnStop.disabled = true;
          btnGetDevices.disabled = false;
          levelFill.style.width = '0%';
        } catch (err) {
          log(`Error: ${err.message}`, 'error');
        }
      });

      // Subscribe to ASR connection status
      window.api.asr.onConnectionStatus((status) => {
        log(`ASR status: ${status}`, status === 'connected' ? 'success' : 'info');
        if (status === 'connected') {
          setASRStatus('connected', 'Connected');
          updateButtons(true, true);
        } else if (status === 'disconnected') {
          setASRStatus('disconnected', 'Disconnected');
          updateButtons(true, false);
        } else if (status === 'connecting') {
          setASRStatus('connecting', 'Connecting...');
        }
      });

      // Subscribe to ASR errors
      window.api.asr.onError((error) => {
        log(`ASR error [${error.code}]: ${error.message}`, 'error');
        setASRStatus('error', 'Error');
      });

      // Subscribe to audio level
      window.api.audio.onLevel((level) => {
        window.updateLevel(level);
      });

      // Subscribe to audio data (for ASR)
      window.api.audio.onAudioData((data) => {
        log(`Audio data: ${data.byteLength} bytes`, 'warn');
        // Send audio to ASR
        window.api.asr.sendAudio(data);
      });

      // Subscribe to audio errors
      window.api.audio.onError((error) => {
        log(`Audio error [${error.code}]: ${error.message}`, 'error');
      });

      // Initial status
      setASRStatus('not-configured', 'Not Configured');
      log('UI initialized. Click "Check Config" to start.');
    </script>
  </body>
</html>
